{% extends "base.html" %}

{% block title %}关系图谱 - {{ repo.name }} - Open LLM Wiki{% endblock %}

{% block head %}
<style>
  .graph-container {
    width: 100%;
    height: calc(100vh - 200px);
    min-height: 500px;
    border: 1px solid var(--pico-muted-border-color);
    border-radius: var(--pico-border-radius);
    background: var(--pico-card-background-color);
  }
  .graph-container svg { width: 100%; height: 100%; }
  .graph-legend { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1rem; }
  .graph-legend span { display: flex; align-items: center; gap: 0.3rem; font-size: 0.85rem; }
  .graph-legend .dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
</style>
{% endblock %}

{% block content %}
<nav aria-label="breadcrumb">
  <ul>
    <li><a href="{{ url_for('repo.dashboard', username=username, repo_slug=repo.slug) }}">{{ repo.name }}</a></li>
    <li>关系图谱</li>
  </ul>
</nav>

<h2>关系图谱</h2>

<div class="graph-legend">
  <span><span class="dot" style="background:#4a90d9"></span> 概览</span>
  <span><span class="dot" style="background:#67b168"></span> 来源</span>
  <span><span class="dot" style="background:#e07b53"></span> 实体</span>
  <span><span class="dot" style="background:#9b6fcf"></span> 概念</span>
  <span><span class="dot" style="background:#d4a94b"></span> 分析</span>
</div>

<div class="graph-container" id="graph"></div>

<script>var graphData = {{ graph_data|tojson }};</script>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="{{ url_for('static', filename='js/graph.js') }}"></script>
{% endblock %}
