{% extends "base.html" %}

{% block title %}关系图谱 - {{ repo.name }} - Open LLM Wiki{% endblock %}

{% block head %}
<style>
  .graph-card {
    min-height: 500px;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }
  .graph-legend {
    display: flex;
    flex-wrap: wrap;
    gap: 0.75rem 1.25rem;
    font-size: 0.85rem;
    color: var(--text-muted);
  }
  .graph-legend span {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
  }
  .graph-legend .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  #graph-container svg {
    width: 100%;
    height: 100%;
    display: block;
  }
</style>
{% endblock %}

{% block content %}
<nav aria-label="面包屑导航">
  <ul class="breadcrumb">
    <li><a href="{{ url_for('repo.dashboard', username=username, repo_slug=repo.slug) }}">{{ repo.name }}</a></li>
    <li>关系图谱</li>
  </ul>
</nav>

<div class="page-header">
  <h2 style="margin:0;display:flex;align-items:center;gap:0.5rem;font-size:1.5rem;">
    <i class="lucide-git-branch" aria-hidden="true"></i>
    关系图谱
  </h2>
</div>

<article class="graph-card">
  <div class="graph-legend" aria-hidden="true">
    <span><span class="dot" style="background:#4a90d9"></span> 概览</span>
    <span><span class="dot" style="background:#67b168"></span> 来源</span>
    <span><span class="dot" style="background:#e07b53"></span> 实体</span>
    <span><span class="dot" style="background:#9b6fcf"></span> 概念</span>
    <span><span class="dot" style="background:#d4a94b"></span> 分析</span>
  </div>
  <div id="graph-container" style="width:100%;height:600px"></div>
</article>
{% endblock %}

{% block scripts %}
<script src="https://d3js.org/d3.v7.min.js"></script>
<script>var graphData = {{ graph_data|tojson }};</script>
<script src="{{ url_for('static', filename='js/graph.js') }}"></script>
{% endblock %}
