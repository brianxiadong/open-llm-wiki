{% extends "base.html" %}

{% block title %}登录 - {{ site_name }}{% endblock %}

{% block content %}
<div class="auth-container">
  <article>
    <div class="auth-brand">
      <i class="lucide-book-open" aria-hidden="true"></i>
      <h2>欢迎回来</h2>
      <p>登录 {{ site_name }}，继续探索与整理知识</p>
    </div>

    <form method="POST" action="{{ url_for('auth.login') }}">
      {% if csrf_token is defined %}
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      {% endif %}

      <label for="username">
        <i class="lucide-user" style="font-size: 0.9rem" aria-hidden="true"></i>
        用户名或邮箱
      </label>
      <input type="text" id="username" name="username" placeholder="请输入用户名或邮箱" required autofocus autocomplete="username">

      <label for="password">
        <i class="lucide-lock" style="font-size: 0.9rem" aria-hidden="true"></i>
        密码
      </label>
      <input type="password" id="password" name="password" placeholder="请输入密码" required autocomplete="current-password">

      <button type="submit" style="width: 100%; margin-top: 0.25rem">登录</button>
    </form>

    <p class="auth-footer"><a href="{{ url_for('auth.forgot_password') }}">忘记密码？</a></p>
    <p class="auth-footer">还没有账号？<a href="{{ url_for('auth.register') }}">立即注册</a></p>
  </article>
</div>
{% endblock %}
