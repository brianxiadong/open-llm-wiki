{% extends "base.html" %}

{% block title %}重置密码 - {{ site_name }}{% endblock %}

{% block content %}
<div class="auth-container">
  <article>
    <div class="auth-brand">
      <i class="lucide-key-round" aria-hidden="true"></i>
      <h2>重置密码</h2>
      <p>请输入新的登录密码。</p>
    </div>

    <form method="POST" action="{{ url_for('auth.reset_password', token=token) }}">
      {% if csrf_token is defined %}
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      {% endif %}

      <label for="password">
        <i class="lucide-lock" style="font-size: 0.9rem" aria-hidden="true"></i>
        新密码
      </label>
      <input type="password" id="password" name="password" placeholder="至少 8 位字符" required minlength="8" autocomplete="new-password">

      <label for="confirm_password">
        <i class="lucide-lock" style="font-size: 0.9rem" aria-hidden="true"></i>
        确认新密码
      </label>
      <input type="password" id="confirm_password" name="confirm_password" placeholder="请再次输入密码" required minlength="8" autocomplete="new-password">

      <button type="submit" style="width: 100%; margin-top: 0.25rem">确认重置</button>
    </form>

    <p class="auth-footer"><a href="{{ url_for('auth.login') }}">返回登录</a></p>
  </article>
</div>
{% endblock %}
