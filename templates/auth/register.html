{% extends "base.html" %}

{% block title %}注册 - Open LLM Wiki{% endblock %}

{% block content %}
<div class="auth-container">
  <article>
    <header>
      <h2>注册</h2>
    </header>
    <form method="POST" action="{{ url_for('auth.register') }}">
      {% if csrf_token is defined %}
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      {% endif %}
      <label for="username">用户名</label>
      <input type="text" id="username" name="username" placeholder="字母、数字和下划线" required autofocus>

      <label for="display_name">显示名称</label>
      <input type="text" id="display_name" name="display_name" placeholder="用于页面展示的名称">

      <label for="password">密码</label>
      <input type="password" id="password" name="password" placeholder="至少 8 位字符" required minlength="8">

      <label for="confirm_password">确认密码</label>
      <input type="password" id="confirm_password" name="confirm_password" placeholder="再次输入密码" required minlength="8">

      <button type="submit">注册</button>
    </form>
    <footer>
      <p class="auth-footer">已有账号？<a href="{{ url_for('auth.login') }}">去登录</a></p>
    </footer>
  </article>
</div>
{% endblock %}
