{% extends "base.html" %}

{% block title %}注册 - {{ site_name }}{% endblock %}

{% block content %}
<div class="auth-container">
  <article>
    <div class="auth-brand">
      <i class="lucide-user-plus" aria-hidden="true"></i>
      <h2>创建账号</h2>
      <p>注册 {{ site_name }}，开始建立与管理你的知识库。注册成功后需先完成邮箱验证。</p>
    </div>

    <form method="POST" action="{{ url_for('auth.register') }}">
      {% if csrf_token is defined %}
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      {% endif %}

      <label for="username">
        <i class="lucide-user" style="font-size: 0.9rem" aria-hidden="true"></i>
        用户名
      </label>
      <input type="text" id="username" name="username" placeholder="字母、数字和下划线" required autofocus autocomplete="username" pattern="[a-zA-Z0-9_]+" title="仅支持字母、数字与下划线">

      <label for="display_name">
        <i class="lucide-id-card" style="font-size: 0.9rem" aria-hidden="true"></i>
        显示名称
      </label>
      <input type="text" id="display_name" name="display_name" placeholder="用于界面展示的名称（可选）" autocomplete="nickname">

      <label for="email">
        <i class="lucide-mail" style="font-size: 0.9rem" aria-hidden="true"></i>
        邮箱
      </label>
      <input type="email" id="email" name="email" placeholder="用于接收找回密码邮件" required autocomplete="email">

      <label for="password">
        <i class="lucide-lock" style="font-size: 0.9rem" aria-hidden="true"></i>
        密码
      </label>
      <input type="password" id="password" name="password" placeholder="至少 8 位字符" required minlength="8" autocomplete="new-password">

      <label for="confirm_password">
        <i class="lucide-lock" style="font-size: 0.9rem" aria-hidden="true"></i>
        确认密码
      </label>
      <input type="password" id="confirm_password" name="confirm_password" placeholder="请再次输入密码" required minlength="8" autocomplete="new-password">

      <button type="submit" style="width: 100%; margin-top: 0.25rem">注册</button>
    </form>

    <p class="auth-footer">已有账号？<a href="{{ url_for('auth.login') }}">去登录</a></p>
  </article>
</div>
{% endblock %}
