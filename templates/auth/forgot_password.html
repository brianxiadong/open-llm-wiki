{% extends "base.html" %}

{% block title %}找回密码 - {{ site_name }}{% endblock %}

{% block content %}
<div class="auth-container">
  <article>
    <div class="auth-brand">
      <i class="lucide-mail-search" aria-hidden="true"></i>
      <h2>找回密码</h2>
      <p>输入注册邮箱，我们会发送密码重置链接。</p>
    </div>

    <form method="POST" action="{{ url_for('auth.forgot_password') }}">
      {% if csrf_token is defined %}
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      {% endif %}

      <label for="email">
        <i class="lucide-mail" style="font-size: 0.9rem" aria-hidden="true"></i>
        邮箱
      </label>
      <input type="email" id="email" name="email" placeholder="请输入注册邮箱" required autofocus autocomplete="email">

      <button type="submit" style="width: 100%; margin-top: 0.25rem">发送重置链接</button>
    </form>

    <p class="auth-footer">想起密码了？<a href="{{ url_for('auth.login') }}">返回登录</a></p>
  </article>
</div>
{% endblock %}
