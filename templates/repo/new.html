{% extends "base.html" %}

{% block title %}新建知识库 - Open LLM Wiki{% endblock %}

{% block content %}
<article class="form-container">
  <header>
    <h2>新建知识库</h2>
  </header>
  <form method="POST" action="{{ url_for('repo.new_repo') }}">
    {% if csrf_token is defined %}
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    {% endif %}

    <label for="name">名称 <span class="required">*</span></label>
    <input type="text" id="name" name="name" placeholder="为知识库起一个名字" required autofocus>

    <label for="slug">标识（URL 路径）</label>
    <input type="text" id="slug" name="slug" placeholder="自动根据名称生成" pattern="[a-z0-9\-]+"
           aria-describedby="slug-help">
    <small id="slug-help">仅支持小写字母、数字和短横线，留空则自动生成</small>

    <label for="description">描述</label>
    <textarea id="description" name="description" placeholder="简要描述知识库的用途" rows="3"></textarea>

    <div class="form-actions">
      <button type="submit">创建知识库</button>
      <a href="{{ url_for('repo.list_repos', username=current_user.username) }}" role="button" class="outline secondary">取消</a>
    </div>
  </form>
</article>
{% endblock %}
