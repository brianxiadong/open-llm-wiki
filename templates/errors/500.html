{% extends "base.html" %}

{% block title %}500 - Open LLM Wiki{% endblock %}

{% block content %}
<div class="error-page">
  <p style="margin: 0 0 0.75rem">
    <i class="lucide-server-off" style="font-size: 3rem; color: var(--error)" aria-hidden="true"></i>
  </p>
  <h1>500</h1>
  <p>服务器内部错误</p>
  <p class="muted" style="font-size: 0.95rem; margin-top: -0.25rem">请稍后重试。若问题持续出现，请联系管理员。</p>
  <p style="margin-top: 1.75rem">
    <a href="{{ url_for('index') }}" class="action-btn action-btn-primary" role="button">
      <i class="lucide-home" aria-hidden="true"></i>
      返回首页
    </a>
  </p>
</div>
{% endblock %}
