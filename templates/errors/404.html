{% extends "base.html" %}

{% block title %}404 - {{ site_name }}{% endblock %}

{% block content %}
<div class="error-page">
  <p style="margin: 0 0 0.75rem">
    <i class="lucide-file-question" style="font-size: 3rem; color: var(--brand-light)" aria-hidden="true"></i>
  </p>
  <h1>404</h1>
  <p>抱歉，我们找不到你要访问的页面。</p>
  <p class="muted" style="font-size: 0.95rem; margin-top: -0.25rem">链接可能已失效，或页面已被移动。</p>
  <p style="margin-top: 1.75rem">
    <a href="{{ url_for('index') }}" class="action-btn action-btn-primary" role="button">
      <i class="lucide-home" aria-hidden="true"></i>
      返回首页
    </a>
  </p>
</div>
{% endblock %}
