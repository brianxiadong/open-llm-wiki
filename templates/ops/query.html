{% extends "base.html" %}

{% block title %}知识查询 - {{ repo.name }} - {{ site_name }}{% endblock %}

{% block content %}
<nav aria-label="面包屑导航">
  <ul class="breadcrumb">
    <li><a href="{{ url_for('repo.dashboard', username=username, repo_slug=repo.slug) }}">{{ repo.name }}</a></li>
    <li>知识查询</li>
  </ul>
</nav>

<header class="page-header">
  <h2 style="margin:0;display:flex;align-items:center;gap:0.5rem;font-size:1.5rem;">
    <i class="lucide-search" aria-hidden="true"></i>
    知识查询
  </h2>
  <div class="page-header-actions"></div>
</header>

<form id="query-form" class="query-form">
  <div class="query-input-row">
    <input type="text" id="query-input" name="q" placeholder="输入你的问题…" required autofocus
           aria-label="查询内容">
    <button type="submit" id="query-submit">
      <i class="lucide-send-horizontal" aria-hidden="true"></i>
      查询
    </button>
  </div>
</form>

<div id="query-loading" class="loading-indicator" hidden>
  <i class="lucide-loader-2 icon-spin" aria-hidden="true"></i>
  <span aria-busy="true">正在查询，请稍候…</span>
</div>

<div id="query-result" hidden>
  <article>
    <header style="padding:0;margin-bottom:1rem;border:none;">
      <h3 style="margin:0;display:flex;align-items:center;gap:0.4rem;font-size:1.15rem;">
        <i class="lucide-message-square-text" aria-hidden="true"></i>
        查询结果
      </h3>
    </header>
    <div id="result-content" class="wiki-content rendered-content" style="margin-bottom:1.25rem;"></div>

    <section id="result-references" class="mb-2">
      <h4 style="display:flex;align-items:center;gap:0.35rem;font-size:1rem;margin:0 0 0.5rem;">
        <i class="lucide-book-marked" aria-hidden="true"></i>
        参考页面
      </h4>
      <ul id="reference-list" style="margin:0;padding-left:1.25rem;"></ul>
    </section>

    <footer style="padding:0;margin:0;border:none;">
      <form method="POST" id="save-page-form"
            action="{{ url_for('ops.save_query_page', username=username, repo_slug=repo.slug) }}">
        <input type="hidden" name="content" id="save-content">
        <input type="hidden" name="query" id="save-query">
        <button type="submit" class="action-btn action-btn-primary">
          <i class="lucide-save" aria-hidden="true"></i>
          保存为 Wiki 页面
        </button>
      </form>
    </footer>
  </article>
</div>

<div id="query-error" hidden>
  <article class="flash-toast flash-error" role="alert" style="display:flex;align-items:flex-start;gap:0.5rem;">
    <i class="lucide-alert-circle" aria-hidden="true" style="flex-shrink:0;margin-top:0.1rem;"></i>
    <span id="error-message"></span>
  </article>
</div>
{% endblock %}

{% block scripts %}
<script>
  (function () {
    var form = document.getElementById('query-form');
    var input = document.getElementById('query-input');
    var loading = document.getElementById('query-loading');
    var result = document.getElementById('query-result');
    var errorEl = document.getElementById('query-error');
    var queryUrl = '{{ url_for("ops.query_api", username=username, repo_slug=repo.slug) }}';

    form.addEventListener('submit', function (e) {
      e.preventDefault();
      var q = input.value.trim();
      if (!q) return;

      loading.hidden = false;
      result.hidden = true;
      errorEl.hidden = true;

      fetch(queryUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ q: q })
      })
        .then(function (r) { return r.json(); })
        .then(function (data) {
          loading.hidden = true;
          if (data.error) {
            document.getElementById('error-message').textContent = data.error;
            errorEl.hidden = false;
            return;
          }
          document.getElementById('result-content').innerHTML = data.html || '';
          var refList = document.getElementById('reference-list');
          refList.innerHTML = '';
          (data.references || []).forEach(function (ref) {
            var li = document.createElement('li');
            var a = document.createElement('a');
            a.href = ref.url;
            a.textContent = ref.title;
            li.appendChild(a);
            refList.appendChild(li);
          });
          document.getElementById('save-content').value = data.markdown || '';
          document.getElementById('save-query').value = q;
          result.hidden = false;
        })
        .catch(function () {
          loading.hidden = true;
          document.getElementById('error-message').textContent = '查询失败，请稍后重试';
          errorEl.hidden = false;
        });
    });
  })();
</script>
{% endblock %}
