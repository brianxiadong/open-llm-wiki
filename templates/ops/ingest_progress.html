{% extends "base.html" %}

{% block title %}文档摄入 - {{ repo.name }} - Open LLM Wiki{% endblock %}

{% block content %}
<nav aria-label="面包屑导航">
  <ul class="breadcrumb">
    <li><a href="{{ url_for('repo.dashboard', username=username, repo_slug=repo.slug) }}">{{ repo.name }}</a></li>
    <li>文档摄入</li>
  </ul>
</nav>

<header class="page-header">
  <h2 style="margin:0;display:flex;align-items:center;gap:0.5rem;font-size:1.5rem;">
    <i class="lucide-download-cloud" aria-hidden="true"></i>
    文档摄入
  </h2>
  <div class="page-header-actions"></div>
</header>

<article>
  <header style="padding:0;margin-bottom:1rem;border:none;">
    <h3 style="margin:0;display:flex;align-items:center;gap:0.4rem;font-size:1.15rem;">
      <i class="lucide-loader" aria-hidden="true"></i>
      <span id="task-title">正在处理…</span>
    </h3>
  </header>

  <div class="progress-section">
    <label id="progress-label" for="progress-bar" style="display:block;margin-bottom:0.5rem;font-size:0.9rem;color:var(--text-muted);">准备中…</label>
    <progress id="progress-bar" value="0" max="100" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></progress>
    <div style="text-align:right;margin-top:0.35rem;">
      <small id="progress-pct" class="muted">0%</small>
    </div>
  </div>

  <div id="step-log" class="step-log" role="log" aria-live="polite" aria-relevant="additions">
    <ul id="step-list"></ul>
  </div>

  <footer id="task-footer" hidden style="padding:0;margin-top:1.25rem;border:none;">
    <a href="{{ url_for('repo.dashboard', username=username, repo_slug=repo.slug) }}" class="action-btn action-btn-primary" role="button">
      <i class="lucide-arrow-left" aria-hidden="true"></i>
      返回知识库
    </a>
  </footer>
</article>
{% endblock %}

{% block scripts %}
<script>
  (function () {
    var streamUrl = '{{ url_for("ops.task_stream", task_id=task_id) }}';
    var bar = document.getElementById('progress-bar');
    var pct = document.getElementById('progress-pct');
    var label = document.getElementById('progress-label');
    var title = document.getElementById('task-title');
    var stepList = document.getElementById('step-list');
    var footer = document.getElementById('task-footer');

    function addStep(msg, status) {
      var li = document.createElement('li');
      var icon = status === 'done' ? '✅' : status === 'error' ? '❌' : '⏳';
      li.textContent = icon + ' ' + msg;
      li.className = 'step-' + status;
      stepList.appendChild(li);
      stepList.parentElement.scrollTop = stepList.parentElement.scrollHeight;
    }

    var source = new EventSource(streamUrl);

    source.addEventListener('progress', function (e) {
      var data = JSON.parse(e.data);
      bar.value = data.percent;
      bar.setAttribute('aria-valuenow', data.percent);
      pct.textContent = data.percent + '%';
      label.textContent = data.message || '';
    });

    source.addEventListener('step', function (e) {
      var data = JSON.parse(e.data);
      addStep(data.message, data.status || 'running');
    });

    source.addEventListener('done', function (e) {
      var data = JSON.parse(e.data);
      title.textContent = '摄入完成';
      bar.value = 100;
      bar.setAttribute('aria-valuenow', '100');
      pct.textContent = '100%';
      label.textContent = data.message || '全部步骤已完成';
      footer.hidden = false;
      source.close();
    });

    source.addEventListener('error_event', function (e) {
      var data = JSON.parse(e.data);
      title.textContent = '摄入失败';
      label.textContent = data.message || '处理过程中出现错误';
      addStep(data.message || '未知错误', 'error');
      footer.hidden = false;
      source.close();
    });

    source.onerror = function () {
      title.textContent = '连接中断';
      label.textContent = '与服务器的连接已断开';
      footer.hidden = false;
      source.close();
    };
  })();
</script>
{% endblock %}
