{% extends "base.html" %}

{% block title %}个人设置 - {{ site_name }}{% endblock %}

{% block content %}
<nav aria-label="面包屑导航">
  <ul class="breadcrumb">
    <li><a href="{{ url_for('index') }}">首页</a></li>
    <li>个人设置</li>
  </ul>
</nav>

<div class="page-header">
  <h2 style="display: flex; align-items: center; gap: 0.5rem; margin: 0">
    <i class="lucide-settings" style="font-size: 1.5rem; color: var(--brand)" aria-hidden="true"></i>
    个人设置
  </h2>
</div>

<div class="form-container">
  <article class="mb-2">
    <header>
      <h3 style="display: flex; align-items: center; gap: 0.45rem; margin: 0 0 1rem; font-size: 1.1rem">
        <i class="lucide-badge-check" style="font-size: 1.15rem; color: var(--brand)" aria-hidden="true"></i>
        基本信息
      </h3>
    </header>
    <form method="POST" action="{{ url_for('user.settings') }}">
      {% if csrf_token is defined %}
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      {% endif %}
      <input type="hidden" name="action" value="update_profile">

      <label for="display_name">
        <i class="lucide-id-card" style="font-size: 0.9rem" aria-hidden="true"></i>
        显示名称
      </label>
      <input type="text" id="display_name" name="display_name"
             value="{{ current_user.display_name or '' }}" placeholder="在界面中展示的名称（可留空）" autocomplete="nickname">

      <label for="email">
        <i class="lucide-mail" style="font-size: 0.9rem" aria-hidden="true"></i>
        邮箱
      </label>
      <input type="email" id="email" name="email"
             value="{{ current_user.email or '' }}" placeholder="用于接收找回密码邮件" required autocomplete="email">

      <button type="submit" style="margin-top: 0.25rem">保存更改</button>
    </form>
  </article>

  <article>
    <header>
      <h3 style="display: flex; align-items: center; gap: 0.45rem; margin: 0 0 1rem; font-size: 1.1rem">
        <i class="lucide-key-round" style="font-size: 1.15rem; color: var(--brand)" aria-hidden="true"></i>
        修改密码
      </h3>
    </header>
    <form method="POST" action="{{ url_for('user.settings') }}">
      {% if csrf_token is defined %}
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      {% endif %}
      <input type="hidden" name="action" value="change_password">

      <label for="old_password">
        <i class="lucide-lock" style="font-size: 0.9rem" aria-hidden="true"></i>
        当前密码
      </label>
      <input type="password" id="old_password" name="old_password" required autocomplete="current-password">

      <label for="new_password">
        <i class="lucide-lock" style="font-size: 0.9rem" aria-hidden="true"></i>
        新密码
      </label>
      <input type="password" id="new_password" name="new_password" required minlength="8" autocomplete="new-password">

      <label for="confirm_password">
        <i class="lucide-lock" style="font-size: 0.9rem" aria-hidden="true"></i>
        确认新密码
      </label>
      <input type="password" id="confirm_password" name="confirm_password" required minlength="8" autocomplete="new-password">

      <p class="muted" style="font-size: 0.82rem; margin: -0.25rem 0 0.75rem">新密码至少 8 位字符，请与上方输入一致。</p>

      <button type="submit">更新密码</button>
    </form>
  </article>
</div>
{% endblock %}
